# Docker Compose configuration file - Connect to host database
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mp-data-entry
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      # Mount project source code (development mode, remove in production)
      - .:/app:ro
      # Mount upload directory (read-write)
      - ./uploads:/app/uploads
      # Mount logs directory
      - ./logs:/app/logs
      # Mount environment configuration
      - ./.env:/app/.env:ro
    # Use host network mode to connect to host database
    network_mode: host
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
